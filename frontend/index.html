<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fog of War Map</title>
    <!-- Подключаем стили карты и плагина для рисования -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div id="map"></div>

<div class="controls-overlay">
        <!-- Кнопка кисти как в Paint -->
        <button id="btn-brush" style="background-color: #ff9800;">🖌 Режим Paint: ВЫКЛ</button>
        <button id="btn-upload" onclick="document.getElementById('gpx-file').click()">🗺 Загрузить GPX</button>
        <input type="file" id="gpx-file" accept=".gpx" />
        <button id="btn-undo">↩ Отменить действие</button>
        <button id="btn-logout" class="danger">🚪 Выйти</button>
    </div>
    <!-- Скрипты -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
